name: Transmissão Automática de TV/Rádio (VOD-to-Live)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      modo_teste:
        description: 'Rodar em modo teste? (ignora data/hora da planilha)'
        required: false
        default: 'nao'
        type: choice
        options:
          - nao
          - sim

concurrency:
  group: transmissao-empire-tv
  cancel-in-progress: false

jobs:
  transmitir:
    name: Processar Transmissão Pendente com FFmpeg
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Baixar Código Fonte do Repositório
        uses: actions/checkout@v4

      - name: Configurar Ambiente Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências e FFmpeg no Servidor do Actions
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install gspread oauth2client pytz requests yt-dlp

      - name: Executar script de automação e iniciar Live Stream
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          RTMP_URL: ${{ secrets.RTMP_URL }}
          RTMP_KEY: ${{ secrets.RTMP_KEY }}
        run: |
          if [ "${{ github.event.inputs.modo_teste }}" = "sim" ]; then
            python transmissao.py --teste
          else
            python transmissao.py
          fi
